<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فتح المشغل</title>
  <style>
    body{
      margin:0;
      background:#111;
      color:#fff;
      font-family:Arial,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      text-align:center;
      padding:20px;
    }
    .box{
      width:100%;
      max-width:420px;
      background:#1c1c1c;
      border-radius:16px;
      padding:24px;
      box-sizing:border-box;
    }
    h2{
      margin:0 0 12px;
      font-size:26px;
    }
    p{
      margin:0 0 20px;
      font-size:18px;
      line-height:1.8;
      color:#ddd;
    }
    a{
      display:inline-block;
      background:#e50914;
      color:#fff;
      text-decoration:none;
      padding:14px 22px;
      border-radius:10px;
      font-size:18px;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>جاري فتح المشغل</h2>
    <p>إذا لم يتم فتح الفيديو تلقائيًا، يرجى تنزيل المشغل الخاص بالتطبيق.</p>
    <a id="installBtn" href="https://play.google.com/store/apps/details?id=com.net.playergo">
      تنزيل المشغل
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const data = params.get("data");

    if (data) {
      const appUrl = "xmtv://" + data;

      setTimeout(function () {
        window.location.href = "https://play.google.com/store/apps/details?id=com.net.playergo";
      }, 1500);

      window.location.href = appUrl;
    }
  </script>
</body>
</html>
